version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartlogix_postgres
    environment:
      POSTGRES_DB: smartlogix_transport
      POSTGRES_USER: smartlogix_user
      POSTGRES_PASSWORD: smartlogix_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/init.sql:/docker-entrypoint-initdb.d/02-init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartlogix_user -d smartlogix_transport"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartlogix_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartlogix.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:

